<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas - Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>

    <aside class="sidebar" id="sidebar-container"></aside>

    <main class="main-content">
        <header class="topbar">
            <div>
                <h1>Panel de Control</h1>
                <p>Bienvenido, revisa tus métricas de hoy.</p>
            </div>
            <div class="user-info">
                <span id="api-location"><i class="fas fa-map-marker-alt"></i> Obteniendo ubicación...</span>
                <button class="btn-primary" id="btn-open-modal"><i class="fas fa-plus"></i> Nueva Tarea</button>
            </div>
        </header>

        <section class="dashboard-cards">
            <div class="card">
                <div class="card-info">
                    <h3>Total Tareas</h3>
                    <span class="number" id="metric-total">0</span>
                </div>
                <i class="fas fa-tasks"></i>
            </div>
            <div class="card" style="border-left: 4px solid var(--success);">
                <div class="card-info">
                    <h3>Completadas</h3>
                    <span class="number" id="metric-completed">0</span>
                </div>
                <i class="fas fa-check-circle" style="color: var(--success);"></i>
            </div>
            <div class="card" style="border-left: 4px solid var(--warning);">
                <div class="card-info">
                    <h3>Pendientes</h3>
                    <span class="number" id="metric-pending">0</span>
                </div>
                <i class="fas fa-clock" style="color: var(--warning);"></i>
            </div>
        </section>
    </main>

    <div class="modal" id="task-modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-bottom: 20px;">Agregar Nueva Tarea</h2>
            <form id="task-form">
                <input type="hidden" id="task-id">
                <div class="form-group"><label>Título</label><input type="text" id="task-title" required></div>
                <div class="form-group"><label>Descripción</label><textarea id="task-desc" rows="3" required></textarea></div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="task-status"><option value="pending">Pendiente</option><option value="completed">Completada</option></select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="btn-close-modal">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/crud.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
